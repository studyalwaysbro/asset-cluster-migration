# Methodology Hyperparameters

rolling_windows:
  window_sizes: [60, 120, 252]
  step_size: 5
  min_periods: 40
  primary_window: 120
  fast_window: 40                    # Early-warning window for TDS spike detection
  fast_window_enabled: true          # Dual-frequency: 120d primary + 40d fast

ewma:
  half_lives: [21, 63]

similarity:
  layers:
    - pearson_shrinkage
    - spearman
    - distance_correlation
    - mutual_information
    - tail_dependence
  tail_quantile: 0.05
  mi_k_neighbors: 5

graph:
  filtering_method: threshold  # threshold, mst, pmfg
  top_k_edges: 5
  mst_enabled: true
  pmfg_enabled: true

clustering:
  primary_method: leiden
  use_consensus: true               # Multi-resolution consensus (adaptive cluster count)
  leiden_resolution: 1.0             # Fallback when use_consensus: false
  spectral_max_clusters: 10
  consensus_n_runs: 100              # Number of Leiden runs per window
  consensus_resolution_range: [0.5, 2.0]  # Resolution sampling range

regimes:
  n_regimes: 3
  hmm_n_iter: 100
  hmm_covariance_type: full
  changepoint_model: rbf
  changepoint_penalty: null  # null = BIC auto-select

migration:
  tds_weights: [0.333, 0.333, 0.334]  # [wasserstein, nmi, spectral]

seeds:
  clustering: 42
  hmm: 42
  consensus: 42
  bootstrap: 42

missing_data:
  max_forward_fill_days: 5
  max_missing_pct: 0.05  # Exclude assets with > 5% missing

data:
  min_inception_date: "2010-01-01"

# Event Study Window Definitions
#
# Timeline source: April 2024 Iran-Israel direct confrontation cycle
#   - Apr 1: Israeli strike on Iranian consulate in Damascus (killed IRGC commanders)
#   - Apr 1-12: Escalation/anticipation (Iran telegraphed retaliation ~12 days)
#   - Apr 13-14 (Sat-Sun): Operation True Promise I (~170 drones, 30+ cruise, 120+ ballistic)
#   - Apr 15 (Mon): First trading day reaction
#   - Apr 19: Israel's restrained counter-strike on Isfahan
#   - Apr 22+: Mutual de-escalation signals
#
# Key market reactions:
#   - Oil: Brent spiked toward $92/bbl, reversed on successful interception
#   - Gold: Pushed above $2400/oz (new ATH), geopolitical premium additive to trend
#   - Equities: S&P dipped ~1-2%, VIX spiked briefly to high teens / low 20s
#   - Treasuries: Modest safe-haven bid, muted by Fed rate path dominance
#   - Defense stocks: Positive (successful interception = live advertisement)
#   - Correlation spike: Classic risk-off pattern, but short-lived (2-5 trading days)
#
# Confounding: CPI print April 10 ran hot (affects Treasuries/equities independently)

events:
  iran_shock_2024:
    name: "Iran-Israel Escalation April 2024 (Operation True Promise I)"
    description: "First-ever direct Iran-Israel military exchange. Iranian drone/missile attack Apr 13-14, Israeli counter-strike Apr 19."
    pre_start: "2024-01-02"
    pre_end: "2024-03-31"
    event_start: "2024-04-01"
    event_end: "2024-04-30"
    post_start: "2024-05-01"
    post_end: "2024-06-28"
    peak_stress_date: "2024-04-15"
    sub_windows:
